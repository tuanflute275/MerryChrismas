    <script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const audioList = [
          "/last-chrismas.mp3",
          "/hoa-nhip-giang-sinh.mp3",
          "/1.mp3",
          "/chill.mp3",
        ];

        // Hàm xử lý khi bài hát kết thúc
        function handleSongEnded() {
          const audioEl = document.getElementById("audioEl");
          const randomAudio =
            audioList[Math.floor(Math.random() * audioList.length)];
          audioEl.src = randomAudio;
          audioEl.muted = false;
          audioEl.play().catch((error) => {
            console.error("Phát nhạc thất bại: ", error);
          });
          fadeInVolume(audioEl);
        }

        // Hàm làm âm lượng tăng dần
        function fadeInVolume(audioEl) {
          let volume = 0; // Bắt đầu với âm lượng bằng 0
          audioEl.volume = volume;
          const interval = setInterval(function () {
            if (volume < 1) {
              volume += 0.05; // Tăng âm lượng mỗi lần
              audioEl.volume = volume;
            } else {
              clearInterval(interval); // Dừng lại khi âm lượng đạt tối đa
            }
          }, 200); // Mỗi 200ms tăng âm lượng
        }

        // Gắn sự kiện "ended" cho phần tử audio
        const audioEl = document.getElementById("audioEl");
        audioEl.addEventListener("ended", handleSongEnded);

        var countMouse = 0;
        var mouse = document.getElementById("message");
        mouse.addEventListener("click", function () {
          countMouse++;
          console.log(countMouse);
          if (countMouse <= 1) {
            const audioEl = document.getElementById("audioEl");
            const randomAudio =
              audioList[Math.floor(Math.random() * audioList.length)];
            audioEl.src = randomAudio;
            audioEl.muted = false;
            audioEl.play().catch((error) => {
              console.error("Phát nhạc thất bại: ", error);
            });
          } else {
            console.error("Đang phát nhạc: ");
          }
        });
      });
    </script>
    <script>
      var canvas = document.querySelector("#snowField");
      var ctx = canvas.getContext("2d");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      var countDownCss = document.getElementById("countdown");
      countDownCss.style.height = canvas.height / 20 + 0 + "px";

      var totalSnow = Math.random() * 800 + 100;
      var shakeAmount = 10; // Số lượng lắc qua lại
      var shakeInterval = 0; // Thời gian lắc
      var shakeDirection = 1; // Phương hướng lắc (trái/phải)

      // vẽ tuyết
      function Snow() {
        this.x = Math.round(Math.random() * canvas.width);
        this.y = Math.round(Math.random() * canvas.height);
        this.r = Math.random() * 4 + 1;
        this.d = Math.random() * totalSnow;
        this.a = Math.random() * 5;
      }

      Snow.prototype.update = function () {
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2, false);
        ctx.fill();
        ctx.closePath();

        this.x += Math.sin(this.a) / 4;
        this.y += Math.random() * 1 + 1;

        if (this.x > canvas.width || this.x < 0) {
          this.x = Math.random() * canvas.width;
        }
        if (this.y > canvas.height) {
          this.y = 0;
        }
        this.a += 0.01;
      };

      var snows = [];
      var isHolding = false;
      var holdInterval;
      var imgTree = new Image();
      imgTree.src = "tree.png";
      var snowman = new Image();
      snowman.src = "snowman.png";

      // vẽ các dối tượng canvas
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(
          imgTree,
          canvas.width - imgTree.width / 2 + 70,
          canvas.height - imgTree.height / 4 + 10,
          500,
          620
        );

        // Tạo hiệu ứng lắc cho snowman
        var shakeX = Math.sin(shakeInterval) * shakeAmount; // Lắc theo phương ngang
        ctx.save(); // Save the current context state
        ctx.translate(950 + shakeX, 500); // Di chuyển snowman và áp dụng lắc
        ctx.drawImage(
          snowman,
          90,
          canvas.height - imgTree.height / 3 + 105,
          400,
          250
        );
        ctx.restore(); // Restore the context state

        // Cập nhật hiệu ứng lắc
        shakeInterval += 0.1;
        if (shakeInterval > Math.PI * 2) {
          shakeInterval = 0;
        }

        for (var i = 0; i < snows.length; i++) {
          snows[i].update();
        }
        requestAnimationFrame(draw);
      }

      function updateCountdown() {
        var now = new Date();
        var christmas = new Date(now.getFullYear(), 11, 25); // Giáng Sinh vào ngày 25 tháng 12

        if (now > christmas) {
          christmas.setFullYear(christmas.getFullYear() + 1);
        }

        var diff = christmas - now;
        var days = Math.floor(diff / (1000 * 60 * 60 * 24));
        var hours = Math.floor(
          (diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)
        );
        var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        var seconds = Math.floor((diff % (1000 * 60)) / 1000);
        days = String(days).padStart(2, "0");
        hours = String(hours).padStart(2, "0");
        minutes = String(minutes).padStart(2, "0");
        seconds = String(seconds).padStart(2, "0");
        document.getElementById("countdown").textContent =
          "Còn " +
          days +
          " ngày " +
          hours +
          " giờ " +
          minutes +
          " phút " +
          seconds +
          " giây";

        setTimeout(updateCountdown, 1000);
      }

          "Mùa Giáng Sinh an lành sẽ mang đến cho bạn những món quà tuyệt vời nhất!",
          "Chúc bạn một mùa Giáng Sinh thật ấm áp bên gia đình và những người thân yêu!",
          "Giáng Sinh này, hãy để niềm vui, tình yêu và hy vọng lan tỏa đến mọi người xung quanh bạn!",
          "Mong rằng năm mới sẽ mang đến cho bạn nhiều cơ hội mới và những thành công lớn!",
        ];

        var randomMessage =
          messages[Math.floor(Math.random() * messages.length)];

        // Hiển thị popup với thông điệp ngẫu nhiên
        document.getElementById("popupMessage").textContent = randomMessage;
        document.getElementById("popup").style.display = "block";
      }

      function closePopup() {
        document.getElementById("popup").style.display = "none";
      }

      function showMessage() {
        var message = document.getElementById("message");
        message.style.display = "block"; // Hiện tin nhắn
        setTimeout(function () {
          message.style.display = "none"; // Ẩn tin nhắn sau 3 giây

      }
      spawnSanta();
      window.onload = function () {
        for (var i = 0; i < totalSnow; ++i) {
          var _snow = new Snow();
          snows.push(_snow);
        }

        draw();
        updateCountdown();
        setInterval(showMessage, Math.random() * 5000 + 3000);
        document.getElementById("message").addEventListener("click", showPopup);
      };
